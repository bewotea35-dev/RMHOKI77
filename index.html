<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Spin</title>
<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
button {padding:10px 20px; font-size:18px; background:lime; border:none; border-radius:5px;}
.box {margin-top:30px; font-size:30px;}
</style>
</head>
<body>

<h1>🎮 GAME SPIN 🎮</h1>
<p>Coba keberuntungan lo!</p>

<div class="box" id="hasil">❓❓❓</div>

<br>
<button onclick="spin()">SPIN</button>

<script>
function spin() {
  let simbol = ["🍒","🍋","🔔","⭐","💎"];
  let hasil = "";
  for(let i=0;i<3;i++){
    hasil += simbol[Math.floor(Math.random()*simbol.length)];
  }
  document.getElementById("hasil").innerHTML = hasil;
}
</script>

</body>
</html>
